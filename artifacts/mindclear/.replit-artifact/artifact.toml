kind = "web"
previewPath = "/"
title = "MindClear"
version = "1.0.0"
id = "artifacts/mindclear"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21858

[services.development]
run = "pnpm --filter @workspace/mindclear run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mindclear", "run", "build" ]
publicDir = "artifacts/mindclear/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21858"
BASE_PATH = "/"
